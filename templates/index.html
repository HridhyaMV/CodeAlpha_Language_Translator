<!DOCTYPE html>

<html>
<head>
    <title>Language Translator</title>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="container">

<h2>Universal Translator</h2>

<form method="POST">

    <textarea
    name="text"
    rows="1"
    placeholder="Enter text here"
    required
    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';"
>{{ input_text }}</textarea>

    <select name="source" id="source">
        <option value="en">English</option>
        <option value="ml">Malayalam</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
    </select>
    <button type="button" class="swap-btn" onclick="swapLanguages()">
    ⇄
    </button>
    <select name="target" id="target">
        <option value="ml">Malayalam</option>
        <option value="en">English</option>
        <option value="hi">Hindi</option>
        <option value="ta">Tamil</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="de">German</option>
    </select>


    <button type="submit">
        Translate
    </button>

   
</form>


<div class="output-header">

    <h3>Translated Text</h3>

    <div class="icons">

        <i class="fa-solid fa-copy"
           onclick="copyText()"></i>

        <i class="fa-solid fa-volume-high"
           onclick="speakText()"></i>

    </div>

</div>

<textarea id="outputText" readonly>{{ translated_text }}</textarea>
<p id="copyMsg"></p>
</div>

<script>

function copyText() {

    const text =
        document.getElementById("outputText").value;

    navigator.clipboard.writeText(text);

    document.getElementById("copyMsg").innerText =
        "✓ Copied to clipboard";

    setTimeout(() => {
        document.getElementById("copyMsg").innerText = "";
    }, 2000);
}

function speakText() {

    const text =
        document.getElementById("outputText").value;

    const lang =
        document.getElementById("target").value;

    if(text.trim() === ""){
        alert("No translated text found!");
        return;
    }

    const audio = new Audio(
        "/speak/" +
        lang +
        "/" +
        encodeURIComponent(text)
    );

    audio.play();
}

function swapLanguages() {

    let source =
        document.getElementById("source");

    let target =
        document.getElementById("target");

    let temp = source.value;

    source.value = target.value;

    target.value = temp;
}

</script>

</body>
</html>
